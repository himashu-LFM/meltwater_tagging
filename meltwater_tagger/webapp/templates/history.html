<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}" />
  <title>History — Sentiment Tagger</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='auth-page.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='fx.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='toasts.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='modal.css') }}" />
</head>
<body>
  <canvas id="bg"></canvas>

  <nav class="page-nav">
    <div class="logo"><span class="logo-icon logo-icon-sm"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="48" fill="#0a0a0c"/><g fill="#f5f5f2"><path d="M50 50 L50 6 A44 44 0 0 1 88 28 Z"/><path d="M50 50 L88 28 A44 44 0 0 1 88 72 Z" opacity="0.72"/><path d="M50 50 L88 72 A44 44 0 0 1 50 94 Z"/><path d="M50 50 L50 94 A44 44 0 0 1 12 72 Z" opacity="0.72"/><path d="M50 50 L12 72 A44 44 0 0 1 12 28 Z"/><path d="M50 50 L12 28 A44 44 0 0 1 50 6 Z" opacity="0.72"/></g><polygon points="50,38 61,57 39,57" fill="url(#logoGoldGrad)"/><defs><linearGradient id="logoGoldGrad" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fdb913"/><stop offset="100%" stop-color="#c9880b"/></linearGradient></defs></svg></span> Meltwater <b>Sentiment Tagger</b></div>
    <div class="links">
      <a href="/">Tagger</a>
      <a href="/brands">Brands</a>
      <a href="/history" class="active">History</a>
      <a href="/profile">Profile</a>
      <a href="#" id="logoutLink">Log out</a>
    </div>
  </nav>

  <main class="wrap">
    <h1 class="section-title">Run <span class="grad">history</span></h1>
    <p class="section-sub">Every classification run you've done, most recent first.</p>

    <div id="runList"></div>

    <!-- run detail modal-ish panel -->
    <div id="detailPanel" class="card glass hidden" style="margin-top:22px"></div>
  </main>

  <script>
    window.__SUPABASE_URL__ = {{ supabase_url|tojson }};
    window.__SUPABASE_ANON_KEY__ = {{ supabase_anon_key|tojson }};
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="{{ url_for('static', filename='three-bg.js') }}"></script>
  <script src="{{ url_for('static', filename='auth.js') }}"></script>
  <script src="{{ url_for('static', filename='toasts.js') }}"></script>
  <script src="{{ url_for('static', filename='modal.js') }}"></script>
  <script src="{{ url_for('static', filename='history.js') }}"></script>
  <script src="{{ url_for('static', filename='fx.js') }}"></script>
</body>
</html>
